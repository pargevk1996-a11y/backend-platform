# Development: expose Postgres/Redis/services on 127.0.0.1 only (not the LAN).
# Set TRUSTED_PROXY_IPS per environment; do not copy dev defaults to staging/production.
#
# Unlike prod, dev reads service config from services/*/.env via env_file so that
# hot iteration on secret rotation scripts and config tweaks does not require
# recreating compose services.
services:
  postgres-auth:
    image: postgres:16
    container_name: postgres-auth
    environment:
      POSTGRES_DB: auth_service
      POSTGRES_USER: auth_service
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_service -d auth_service"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-user:
    image: postgres:16
    container_name: postgres-user
    environment:
      POSTGRES_DB: user_service
      POSTGRES_USER: user_service
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_service -d user_service"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: redis-auth
    ports:
      - "127.0.0.1:6379:6379"
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: auth-service
    container_name: auth-service
    env_file:
      - ../../services/auth-service/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://auth_service:${AUTH_DB_PASSWORD}@postgres-auth:5432/auth_service
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SERVICE_ENV: development
    ports:
      - "127.0.0.1:8001:8001"
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/v1/health/live', timeout=2)"
      interval: 10s
      timeout: 5s
      retries: 10

  user-service:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: user-service
    container_name: user-service
    env_file:
      - ../../services/user-service/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://user_service:${USER_DB_PASSWORD}@postgres-user:5432/user_service
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      SERVICE_ENV: development
    ports:
      - "127.0.0.1:8002:8002"
    depends_on:
      postgres-user:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/v1/health/live', timeout=2)"
      interval: 10s
      timeout: 5s
      retries: 10

  api-gateway:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: api-gateway
    container_name: api-gateway
    env_file:
      - ../../services/api-gateway/.env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
      AUTH_SERVICE_URL: http://auth-service:8001
      USER_SERVICE_URL: http://user-service:8002
      SERVICE_ENV: development
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/health/live', timeout=2)"
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_auth_data:
  postgres_user_data:
  redis_data:
