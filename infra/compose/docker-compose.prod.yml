services:
  postgres-auth:
    image: postgres:16
    container_name: postgres-auth
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_service
      POSTGRES_USER: auth_service
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend

  postgres-user:
    image: postgres:16
    container_name: postgres-user
    restart: unless-stopped
    environment:
      POSTGRES_DB: user_service
      POSTGRES_USER: user_service
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - backend

  auth-service:
    build:
      context: ../..
      dockerfile: infra/docker/auth-service.Dockerfile
    container_name: auth-service
    restart: unless-stopped
    env_file:
      - ../../services/auth-service/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://auth_service:${AUTH_DB_PASSWORD}@postgres-auth:5432/auth_service
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SERVICE_ENV: production
      TRUSTED_PROXY_IPS: 172.16.0.0/12
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/v1/health/live', timeout=2)",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # backend is internal-only; SMTP to smtp.gmail.com needs outbound DNS + TCP egress.
    networks:
      - backend
      - edge

  user-service:
    build:
      context: ../..
      dockerfile: infra/docker/user-service.Dockerfile
    container_name: user-service
    restart: unless-stopped
    env_file:
      - ../../services/user-service/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://user_service:${USER_DB_PASSWORD}@postgres-user:5432/user_service
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      SERVICE_ENV: production
      TRUSTED_PROXY_IPS: 172.16.0.0/12
    depends_on:
      postgres-user:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/v1/health/live', timeout=2)",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - backend

  api-gateway:
    build:
      context: ../..
      dockerfile: infra/docker/gateway.Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    env_file:
      - ../../services/api-gateway/.env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
      AUTH_SERVICE_URL: http://auth-service:8001
      USER_SERVICE_URL: http://user-service:8002
      SERVICE_ENV: production
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${GATEWAY_PORT:-8080}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/health/live', timeout=2)",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - backend
      - edge

networks:
  backend:
    internal: true
  edge:

volumes:
  postgres_auth_data:
  postgres_user_data:
  redis_data:
