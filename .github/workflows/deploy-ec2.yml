# Remote deploy to an EC2 host that already has: git clone, Docker, repo at REPO_PATH,
# infra/compose/.env.compose, secrets/. Run manually: Actions → Deploy EC2 → Run workflow.
#
# Repository secrets (Settings → Secrets and variables → Actions):
#   EC2_HOST            — public IPv4 or DNS (e.g. 13.60.47.152)
#   EC2_USER            — SSH user (usually ubuntu)
#   EC2_SSH_PRIVATE_KEY — full PEM for that user (-----BEGIN ... PRIVATE KEY-----)
#
name: Deploy EC2

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Git branch to deploy (checkout + pull --ff-only)"
        required: true
        default: "deploy/smtp-ec2-mail-delivery"
        type: string
      cors_origins:
        description: "CORS_ORIGINS for render_prod_env (comma-separated, include :8080 if used)"
        required: true
        default: "http://13.60.47.152:8080,http://13.60.47.152"
        type: string
      repo_path:
        description: "Absolute path to repo root on the EC2 host"
        required: true
        default: "/home/ubuntu/backend-platform"
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: SSH and run ec2_update
        env:
          BRANCH: ${{ github.event.inputs.branch }}
          CORS_ORIGINS: ${{ github.event.inputs.cors_origins }}
          REPO_PATH: ${{ github.event.inputs.repo_path }}
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 45m
          script_stop: true
          envs: BRANCH,CORS_ORIGINS,REPO_PATH
          script: |
            set -euo pipefail
            cd "${REPO_PATH}"
            export CORS_ORIGINS="${CORS_ORIGINS}"
            export BRANCH="${BRANCH}"
            bash infra/scripts/ec2_update.sh
